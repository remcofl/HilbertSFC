name: Docs

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch gh-pages (if it exists)
        run: |
          git fetch origin gh-pages --depth=1 || true

      - name: Deploy versioned docs with mike
        env:
          NO_MKDOCS_2_WARNING: "1"
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            uv run --no-dev --group docs mike deploy --push --update-aliases --alias-type=copy "${VERSION}" latest
            uv run --no-dev --group docs mike set-default --push latest
          else
            uv run --no-dev --group docs mike deploy --push --alias-type=copy main
          fi
