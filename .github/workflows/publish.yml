name: "Publish"

on:
  push:
    tags:
      - test-* # TestPyPI tags
      - v* # Real PyPI tags

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref_name, 'v') && 'pypi' || 'testpypi' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Build
        run: uv build

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl --with pytest pytest -q

      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz --with pytest pytest -q

      - name: Publish
        run: |
          if [[ "${GITHUB_REF_NAME}" == test-* ]]; then
            uv publish --index testpypi
          else
            uv publish
          fi
