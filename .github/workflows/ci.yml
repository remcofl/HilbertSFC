name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nox:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Needed for reliable change detection on PRs.
          fetch-depth: 0

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            torch:
              - 'src/hilbertsfc/torch/**'
              - 'src/hilbertsfc/_*.py'
              - 'src/hilbertsfc/hilbert2d.py'
              - 'src/hilbertsfc/hilbert3d.py'
              - 'tests/test_torch*.py'
              - 'tests/conftest.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'noxfile.py'
              - '.github/workflows/ci.yml'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Run Nox sessions
        run: uvx nox -s lint typecheck test test_min

      - name: Build docs
        run: uvx nox -s docs

      - name: Build package
        run: uv build

      - name: Smoke test wheel
        run: >
          uv run --isolated --no-project --with dist/*.whl python -c "from
          hilbertsfc import hilbert_decode_2d, hilbert_encode_2d; i =
          hilbert_encode_2d(1, 2, nbits=2); assert hilbert_decode_2d(i, nbits=2)
          == (1, 2)"

      - name: Smoke test source distribution
        run: >
          uv run --isolated --no-project --with dist/*.tar.gz python -c "from
          hilbertsfc import hilbert_decode_3d, hilbert_encode_3d; i =
          hilbert_encode_3d(1, 2, 3, nbits=2); assert hilbert_decode_3d(i,
          nbits=2) == (1, 2, 3)"

      - name: Run Torch Nox sessions
        if: steps.changes.outputs.torch == 'true'
        run: uvx nox -s test_torch_cpu test_torch_cpu_min test_torch_compile_cpu-3.12
