site_name: HilbertSFC
site_description: Ultra-fast 2D & 3D Hilbert space-filling curve encode/decode kernels (NumPy + Numba).
repo_url: https://github.com/remcofl/HilbertSFC
repo_name: remcofl/HilbertSFC
site_url: https://remcofl.github.io/HilbertSFC/

extra:
  version:
    provider: mike
    default: latest
    alias: true

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  logo: img/logo.png
  favicon: img/favicon.png
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

nav:
  - Home: index.md
  - Quick start: quickstart.md
  - API Reference:
      - Package: api/package.md
      - 2D: api/2d.md
      - 3D: api/3d.md
      - Types: api/types.md

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            show_overloads: false

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
